server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: fluxpay-website

  # ── 数据源（HikariCP，website 无需 Druid 监控）──────────────────
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fluxpay}?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&characterEncoding=utf8mb4
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # ── Redis（Spring Boot 3 统一使用 spring.data.redis）─────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 16
          max-wait: 1000ms

  # ── 邮件（发送注册验证码、密码重置链接）──────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:no-reply@fluxpay.com}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

  # ── Jackson ───────────────────────────────────────────────────
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

# ── MyBatis-Plus ───────────────────────────────────────────────
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fluxpay.core.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ── 邮件验证码有效期（秒）────────────────────────────────────────
fluxpay:
  captcha:
    # 邮件验证码有效期：10 分钟
    expire: 600

# ── 日志 ───────────────────────────────────────────────────────
logging:
  level:
    com.fluxpay: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n"
